<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <defs>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF3D00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Gear Icon -->
  <g transform="translate(55,60)">
    <!-- Gear teeth -->
    <g fill="url(#gearGrad)">
      <rect x="-6" y="-38" width="12" height="12" rx="2"/>
      <rect x="-6" y="26" width="12" height="12" rx="2"/>
      <rect x="26" y="-6" width="12" height="12" rx="2"/>
      <rect x="-38" y="-6" width="12" height="12" rx="2"/>
      <rect x="17" y="-30" width="12" height="12" rx="2" transform="rotate(45,23,-24)"/>
      <rect x="-30" y="-30" width="12" height="12" rx="2" transform="rotate(-45,-24,-24)"/>
      <rect x="17" y="17" width="12" height="12" rx="2" transform="rotate(-45,23,23)"/>
      <rect x="-30" y="17" width="12" height="12" rx="2" transform="rotate(45,-24,23)"/>
    </g>
    <!-- Gear body -->
    <circle cx="0" cy="0" r="26" fill="url(#gearGrad)"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="12" fill="white"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="url(#gearGrad)"/>
  </g>

  <!-- Brand name -->
  <text x="115" y="52" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="900" fill="url(#textGrad)" letter-spacing="1">gear</text>
  <text x="115" y="88" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="900" fill="url(#gearGrad)" letter-spacing="1">gao</text>

  <!-- .com tag -->
  <rect x="222" y="68" width="52" height="22" rx="11" fill="url(#gearGrad)" opacity="0.15"/>
  <text x="248" y="84" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FF3D00" text-anchor="middle">.com</text>

  <!-- Tagline -->
  <text x="115" y="108" font-family="Arial, sans-serif" font-size="11" fill="#888" letter-spacing="2">SABAI COMMERCE</text>
</svg>
