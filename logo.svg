<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA000;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="280" height="80" rx="16" fill="url(#bgGrad)"/>

  <!-- Icon: shopping bag -->
  <g transform="translate(16, 12)">
    <rect x="4" y="20" width="36" height="28" rx="5" fill="url(#iconGrad)"/>
    <path d="M14 20 C14 10 30 10 30 20" fill="none" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <rect x="10" y="26" width="6" height="3" rx="1.5" fill="white" opacity="0.4"/>
    <path d="M15 34 L19 39 L29 28" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <text x="68" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="900" fill="white" letter-spacing="1">สบาย</text>
  <text x="68" y="62" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" fill="#90CAF9" letter-spacing="0.5">พาณิชย์</text>

  <line x1="170" y1="18" x2="170" y2="62" stroke="#1E88E5" stroke-width="1" opacity="0.6"/>

  <text x="180" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#90CAF9" letter-spacing="0.3">SABAI</text>
  <text x="180" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#90CAF9" letter-spacing="0.3">COMMERCE</text>
  <text x="180" y="62" font-family="'Segoe UI', Arial, sans-serif" font-size="7.5" fill="#64B5F6" letter-spacing="0.5">OFFICIAL STORE</text>

  <polygon points="264,18 266,24 272,24 267,28 269,34 264,30 259,34 261,28 256,24 262,24" fill="#FFD700" opacity="0.9"/>
</svg>
