<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA000;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="280" height="80" rx="16" fill="url(#bgGrad)"/>

  <!-- Icon: gear -->
  <g transform="translate(34, 40)">
    <g fill="url(#gearGrad)">
      <rect x="-4.5" y="-27" width="9" height="9" rx="1.5"/>
      <rect x="-4.5" y="18" width="9" height="9" rx="1.5"/>
      <rect x="18" y="-4.5" width="9" height="9" rx="1.5"/>
      <rect x="-27" y="-4.5" width="9" height="9" rx="1.5"/>
      <rect x="12" y="-21" width="9" height="9" rx="1.5" transform="rotate(45,16.5,-16.5)"/>
      <rect x="-21" y="-21" width="9" height="9" rx="1.5" transform="rotate(-45,-16.5,-16.5)"/>
      <rect x="12" y="12" width="9" height="9" rx="1.5" transform="rotate(-45,16.5,16.5)"/>
      <rect x="-21" y="12" width="9" height="9" rx="1.5" transform="rotate(45,-16.5,16.5)"/>
    </g>
    <circle cx="0" cy="0" r="18.5" fill="url(#gearGrad)"/>
    <circle cx="0" cy="0" r="8.5" fill="#0F3460"/>
    <circle cx="0" cy="0" r="3.5" fill="url(#gearGrad)"/>
  </g>

  <!-- Text -->
  <text x="66" y="42" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="900" fill="white" letter-spacing="0.5">GEARGAO</text>
  <text x="66" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#90CAF9" letter-spacing="1.5">GEARGAO.COM · OFFICIAL STORE</text>

  <polygon points="264,14 266,20 272,20 267,24 269,30 264,26 259,30 261,24 256,20 262,20" fill="#FFD700" opacity="0.9"/>
