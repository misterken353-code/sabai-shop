<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#16213E"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF3D00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="315" r="280" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.15"/>
  <circle cx="950" cy="315" r="220" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.1"/>
  <circle cx="950" cy="315" r="160" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.08"/>
  <circle cx="100" cy="80" r="120" fill="#FF6B35" opacity="0.05"/>
  <circle cx="1150" cy="550" r="100" fill="#FF6B35" opacity="0.05"/>

  <!-- Big Gear (right side decoration) -->
  <g transform="translate(960,315)" opacity="0.2">
    <g fill="#FF6B35">
      <rect x="-18" y="-115" width="36" height="30" rx="5"/>
      <rect x="-18" y="85" width="36" height="30" rx="5"/>
      <rect x="85" y="-18" width="30" height="36" rx="5"/>
      <rect x="-115" y="-18" width="30" height="36" rx="5"/>
      <rect x="52" y="-90" width="36" height="30" rx="5" transform="rotate(45,70,-75)"/>
      <rect x="-90" y="-90" width="36" height="30" rx="5" transform="rotate(-45,-72,-75)"/>
      <rect x="52" y="60" width="36" height="30" rx="5" transform="rotate(-45,70,75)"/>
      <rect x="-90" y="60" width="36" height="30" rx="5" transform="rotate(45,-72,75)"/>
    </g>
    <circle cx="0" cy="0" r="80" fill="#FF6B35"/>
    <circle cx="0" cy="0" r="38" fill="#16213E"/>
    <circle cx="0" cy="0" r="16" fill="#FF6B35"/>
  </g>

  <!-- Small Gear (left side) -->
  <g transform="translate(80,540)" opacity="0.15">
    <circle cx="0" cy="0" r="40" fill="#FF6B35"/>
    <circle cx="0" cy="0" r="18" fill="#16213E"/>
  </g>

  <!-- Orange accent line -->
  <rect x="100" y="200" width="6" height="230" rx="3" fill="url(#orange)"/>

  <!-- Main Logo area -->
  <g transform="translate(130,240)">
    <!-- Small gear icon -->
    <g transform="translate(0,30)" filter="url(#glow)">
      <circle cx="0" cy="0" r="30" fill="url(#orange)"/>
      <circle cx="0" cy="0" r="13" fill="#1A1A2E"/>
      <circle cx="0" cy="0" r="6" fill="#FF6B35"/>
      <g fill="url(#orange)">
        <rect x="-5" y="-42" width="10" height="14" rx="2"/>
        <rect x="-5" y="28" width="10" height="14" rx="2"/>
        <rect x="28" y="-5" width="14" height="10" rx="2"/>
        <rect x="-42" y="-5" width="14" height="10" rx="2"/>
      </g>
    </g>

    <!-- gear text -->
    <text x="60" y="0" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="white" opacity="0.95">gear</text>
    <!-- gao text -->
    <text x="60" y="115" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="url(#orange)">gao</text>

    <!-- .com -->
    <text x="450" y="115" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="white" opacity="0.5">.com</text>
  </g>

  <!-- Tagline -->
  <text x="136" y="490" font-family="Arial, sans-serif" font-size="22" fill="#FF6B35" letter-spacing="4">ร้านสบายพาณิชย์ · ครบ จบ ที่เดียว</text>

  <!-- Website URL badge -->
  <rect x="136" y="530" width="260" height="50" rx="25" fill="url(#orange)" opacity="0.9"/>
  <text x="266" y="562" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="white" text-anchor="middle">🌐 geargao.com</text>

  <!-- Phone -->
  <text x="420" y="562" font-family="Arial, sans-serif" font-size="18" fill="white" opacity="0.7">📞 080-7673617</text>
</svg>
